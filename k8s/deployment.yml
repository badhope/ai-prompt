apiVersion: v1
kind: Namespace
metadata:
  name: ai-prompt-framework
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-prompt-api
  namespace: ai-prompt-framework
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-prompt-api
  template:
    metadata:
      labels:
        app: ai-prompt-api
    spec:
      containers:
      - name: api
        image: ai-prompt-framework:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-prompt-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ai-prompt-secrets
              key: redis-url
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-prompt-service
  namespace: ai-prompt-framework
spec:
  selector:
    app: ai-prompt-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-prompt-hpa
  namespace: ai-prompt-framework
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-prompt-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
